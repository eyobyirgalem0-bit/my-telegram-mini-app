<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሙከራ ሚኒ አፕ</title>
    <!-- የቴሌግራም ሚኒ አፕ SDK እዚህ ይገናኛል -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 id="welcome-message">ሰላም! ወደ ሙከራ አፑ እንኳን መጡ።</h1>
    <button id="send-btn">ለቦቱ መልዕክት ላክ</button>

    <script>
        // የቴሌግራም ሚኒ አፕን ማስጀመር
        const tg = window.Telegram.WebApp;
        tg.expand(); // አፑን ሙሉ ስክሪን ማድረግ

        // የተጠቃሚውን ስም ከቴሌግራም ላይ አውጥቶ ሰላምታ መስጠት
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome-message').innerText = `ሰላም ${user.first_name}! ወደ ሙከራ አፑ እንኳን መጡ።`;
        }

        // ቁልፉ ሲጫን ለቦቱ መረጃ መላክ
        document.getElementById('send-btn').addEventListener('click', () => {
            tg.sendData("ሰላም ቦት! ይህንን መልዕክት የላክኩልህ ከሚኒ አፑ ውስጥ ሆኜ ነው።");
            tg.close(); // መረጃውን ከላከ በኋላ አፑን መዝጋት
        });
    </script>
</body>
</html>
